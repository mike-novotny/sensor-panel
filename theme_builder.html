      maxValue:s.max,manualSize:true};
    elems.push(bar);renderEl(bar);
    return barY+12;
  }
  return barY;
}
function mkBigBar(x,y,w,key,vibe){
  // Standalone labeled bar — taller, used as a primary display type (not the compact row version)
  const s=SEN[key];
  const fsLbl=Math.max(11,Math.round(w*0.06));
  const lbl={id:genId(),type:'static',sensorKey:'',x,y,z:nextZ(),visible:true,
    customText:s.l.toUpperCase(),w,h:fsLbl*1.3,fontSize:fsLbl,fontFamily:vibe.font,
    color:vibe.sub,bold:false,align:'left',manualSize:false};
  elems.push(lbl);renderEl(lbl);
  const barY=y+fsLbl*1.5;
  const barH=Math.max(14,Math.round(w*0.045));
  const bar={id:genId(),type:'bar',sensorKey:key,x,y:barY,z:nextZ(),visible:true,
    w,h:barH,fillColor:vibe.accent,bgColor:vibe.sub.slice(0,7)+'22',
    borderColor:'#00000000',borderThickness:0,cornerRadius:vibe.corner>4?barH/2:3,
    maxValue:s.max||100,manualSize:true};
  elems.push(bar);renderEl(bar);
  return {h:fsLbl*1.5+barH, w};
}
function mkGraph(x,y,w,h,key,vibe){
  const s=SEN[key];
  const fsLbl=Math.max(11,Math.round(w*0.05));
  const lbl={id:genId(),type:'static',sensorKey:'',x,y,z:nextZ(),visible:true,
    customText:s.l.toUpperCase(),w,h:fsLbl*1.3,fontSize:fsLbl,fontFamily:vibe.font,
    color:vibe.sub,bold:false,align:'left',manualSize:false};
  elems.push(lbl);renderEl(lbl);
  const gY=y+fsLbl*1.5;
  const gH=h-fsLbl*1.5;
  const graph={id:genId(),type:'linegraph',sensorKey:key,x,y:gY,z:nextZ(),visible:true,
    w,h:gH,maxValue:s.max||100,lineColor:vibe.accent,bgColor:vibe.sub.slice(0,7)+'18',
    showGrid:true,gridColor:vibe.sub.slice(0,7)+'22',historySeconds:60,manualSize:true};
  elems.push(graph);renderEl(graph);
  return {h:fsLbl*1.5+gH, w};
}
function mkDivider(x,y,w,vibe){
  const div={id:genId(),type:'rect',sensorKey:'',x,y,z:nextZ(),visible:true,
    w,h:1.5,fillColor:vibe.sub.slice(0,7)+'40',cornerRadius:0,manualSize:true};
  elems.push(div);renderEl(div);
  return 1.5;
}

// ── Layout templates ──────────────────────────────────────────────────────────
// Multiple genuinely different structures per orientation, picked at random
// each generation so repeat AI Generate calls produce visibly different results.

function layoutVertical(vibe, sensorList, margin, usableW){
  const templates=['rings-top','stacked-bars','mixed-graph','single-column'];
  const tmpl=templates[Math.floor(Math.random()*templates.length)];
  console.log('[AI Generate] Vertical template:', tmpl);

  let y=margin;
  const clk=mkClock(margin,y,usableW,vibe); y+=clk.h+4;
  const dt=mkDate(margin,y,usableW,vibe); y+=dt.h+margin*0.8;

  const ringKeys=sensorList.filter(([k,t])=>t==='ring').map(([k])=>k);
  const barKeys=sensorList.filter(([k,t])=>t==='bar').map(([k])=>k);
  const graphKeys=sensorList.filter(([k,t])=>t==='graph').map(([k])=>k);
  const textKeys=sensorList.filter(([k,t])=>t==='text').map(([k])=>k);
  // Treat any ring/bar without explicit graph as part of the "featured" group
  const featured=[...ringKeys,...barKeys];
  const shuffledText=[...textKeys];
  if(Math.random()<0.5) shuffledText.sort(()=>Math.random()-0.5);
  const showDivider=Math.random()<0.45;

  if(tmpl==='rings-top'){
    // Two rings side by side, then 2-col grid of remaining sensors
    if(featured.length>0){
      const ringScale=0.92+Math.random()*0.16;
      const ringD=Math.round((featured.length===1?usableW*0.5:usableW*0.38)*ringScale);
      const gap=usableW-ringD*Math.min(2,featured.length);
      featured.slice(0,2).forEach((key,i)=>{
        mkRing(margin+i*(ringD+gap),y,ringD,key,vibe);
      });
      y+=ringD+Math.max(11,Math.round(ringD*0.085))*1.6+margin*0.9;
    }
    if(showDivider){y+=mkDivider(margin,y,usableW,vibe)+margin*0.6;}
    const colW=Math.round((usableW-margin*0.5)/2);
    let leftY=y, rightY=y;
    [...shuffledText,...featured.slice(2)].forEach((key,i)=>{
      if(i%2===0) leftY=mkTextRow(margin,leftY,colW,key,vibe)+margin*0.6;
      else rightY=mkTextRow(margin+colW+margin*0.5,rightY,colW,key,vibe)+margin*0.6;
    });

  } else if(tmpl==='stacked-bars'){
    // All featured sensors as big standalone bars, stacked vertically, then text grid
    featured.forEach(key=>{
      const r=mkBigBar(margin,y,usableW,key,vibe);
      y+=r.h+margin*0.5;
    });
    if(showDivider && (featured.length>0)){y+=mkDivider(margin,y,usableW,vibe)+margin*0.5;}
    const colW=Math.round((usableW-margin*0.5)/2);
    let leftY=y, rightY=y;
    shuffledText.forEach((key,i)=>{
      if(i%2===0) leftY=mkTextRow(margin,leftY,colW,key,vibe)+margin*0.6;
      else rightY=mkTextRow(margin+colW+margin*0.5,rightY,colW,key,vibe)+margin*0.6;
    });

  } else if(tmpl==='mixed-graph'){
    // One ring (hero), one full-width graph, remaining as single-column rows
    if(featured.length>0){
      const ringD=Math.round(usableW*0.46);
      mkRing(Math.round(margin+(usableW-ringD)/2),y,ringD,featured[0],vibe);
      y+=ringD+Math.max(11,Math.round(ringD*0.085))*1.6+margin*0.7;
    }
    const graphH=Math.round(usableW*0.32);
    const graphKey=featured[1]||graphKeys[0]||shuffledText[0];
    if(graphKey){
      const r=mkGraph(margin,y,usableW,graphH,graphKey,vibe);
      y+=r.h+margin*0.7;
      shuffledText.splice(shuffledText.indexOf(graphKey),1);
    }
    if(showDivider){y+=mkDivider(margin,y,usableW,vibe)+margin*0.5;}
    shuffledText.forEach(key=>{
      y=mkTextRow(margin,y,usableW,key,vibe)+margin*0.5;
    });

  } else { // single-column
    // Everything in one full-width column: featured items get rings if room,
    // otherwise compact rows; cleaner, simpler look
    const all=[...featured,...shuffledText];
    let ringBudget=Math.min(1,featured.length); // only first featured as a ring here
    all.forEach((key,i)=>{
      if(i===0 && featured.includes(key) && ringBudget>0){
        const ringD=Math.round(usableW*0.42);
        mkRing(Math.round(margin+(usableW-ringD)/2),y,ringD,key,vibe);
        y+=ringD+Math.max(11,Math.round(ringD*0.085))*1.6+margin*0.7;
        ringBudget--;
      } else {
        y=mkTextRow(margin,y,usableW,key,vibe)+margin*0.45;
      }
    });
  }
}

function layoutHorizontal(vibe, sensorList, margin, usableW){
  const templates=['rings-mid','bars-right','graph-bottom'];
  const tmpl=templates[Math.floor(Math.random()*templates.length)];
  console.log('[AI Generate] Horizontal template:', tmpl);

  const ringKeys=sensorList.filter(([k,t])=>t==='ring').map(([k])=>k);
  const barKeys=sensorList.filter(([k,t])=>t==='bar').map(([k])=>k);
  const featured=[...ringKeys,...barKeys];
  const textKeys=sensorList.filter(([k,t])=>t==='text').map(([k])=>k);
  const shuffledText=[...textKeys];
  if(Math.random()<0.5) shuffledText.sort(()=>Math.random()-0.5);

  let x=margin;
  const colW=Math.round(usableW*0.2);
  const clk=mkClock(x,margin,colW,vibe);
  const dt=mkDate(x,margin+clk.h+4,colW,vibe);
  x+=colW+margin;

  // Helper: lay out text rows in as many columns as needed to fit CH,
  // wrapping to a new column instead of overflowing the bottom
  const ROW_H_EST=row=>{
    const fsLbl=Math.max(11,Math.round(row*0.07)), fsVal=Math.max(16,Math.round(row*0.12));
    return fsLbl*1.5+fsVal*1.4+12+margin*0.4;
  };
  function layoutTextColumns(startX, startY, availW, availH, keys){
    if(keys.length===0||availW<=60) return startX;
    // Estimate how many rows fit per column
    const rowH=ROW_H_EST(Math.min(availW,200));
    const rowsPerCol=Math.max(1,Math.floor((availH-startY)/rowH));
    const nCols=Math.max(1,Math.ceil(keys.length/rowsPerCol));
    const colW=Math.min(220,Math.floor((availW-margin*0.5*(nCols-1))/nCols));
    let idx=0,maxX=startX;
    for(let c=0;c<nCols;c++){
      let cy=startY;
      const cx=startX+c*(colW+margin*0.5);
      for(let r=0;r<rowsPerCol && idx<keys.length;r++,idx++){
        cy=mkTextRow(cx,cy,colW,keys[idx],vibe)+margin*0.4;
      }
      maxX=Math.max(maxX,cx+colW);
    }
    return maxX;
  }

  if(tmpl==='rings-mid'){
    if(featured.length>0){
      const ringScale=0.92+Math.random()*0.16;
      const ringD=Math.round(CH*0.46*ringScale);
      const labelH=Math.max(11,Math.round(ringD*0.085))*1.6;
      const ringY=Math.round((CH-ringD-labelH)/2);
      featured.slice(0,3).forEach(key=>{
        mkRing(x,ringY,ringD,key,vibe);
        x+=ringD+margin*0.6;
      });
    }
    const remainW=CW-x-margin;
    layoutTextColumns(x,margin,remainW,CH-margin,shuffledText);

  } else if(tmpl==='bars-right'){
    // Big bars stacked in a middle column (only as many as fit), text after
    const barColW=Math.round(usableW*0.32);
    const barH=ROW_H_EST(barColW)*0.75;
    const maxBars=Math.max(1,Math.floor((CH-margin*2)/barH));
    let by=margin;
    featured.slice(0,maxBars).forEach(key=>{
      const r=mkBigBar(x,by,barColW,key,vibe);
      by+=r.h+margin*0.5;
    });
    // Any leftover featured sensors fall through to text columns
    const overflowFeatured=featured.slice(maxBars);
    x+=barColW+margin;
    const remainW=CW-x-margin;
    layoutTextColumns(x,margin,remainW,CH-margin,[...shuffledText,...overflowFeatured]);

  } else { // graph-bottom
    const topH=Math.round(CH*0.62);
    if(featured.length>0){
      const ringD=Math.round(topH*0.7);
      const labelH=Math.max(11,Math.round(ringD*0.085))*1.6;
      const ringY=Math.round((topH-ringD-labelH)/2)+margin*0.3;
      featured.slice(0,2).forEach(key=>{
        mkRing(x,ringY,ringD,key,vibe);
        x+=ringD+margin*0.6;
      });
    }
    const remainW=CW-x-margin;
    const graphKey=featured[2]||shuffledText[shuffledText.length-1];
    const textForTop=graphKey?shuffledText.filter(k=>k!==graphKey):shuffledText;
    layoutTextColumns(x,margin,remainW,topH,textForTop);
    if(graphKey){
      mkGraph(margin,topH+margin*0.5,usableW,CH-topH-margin*1.5,graphKey,vibe);
    }
  }
}

buildPalette();
setOri('vertical');
setTimeout(()=>chZoom(0),100);
refreshLayers();updStatus();

setTimeout(()=>promptSensorImport(), 600);
